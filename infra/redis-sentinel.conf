# Redis Sentinel Configuration - Production High Availability
port 26379
daemonize no
pidfile /var/run/redis-sentinel.pid
logfile "/var/log/redis/sentinel.log"
dir /tmp

# Monitor primary Redis instance named "hbcerp-redis"
# Sentinel quorum set to 2. At least 2 Sentinels must agree master is down.
sentinel monitor mymaster redis-primary 6379 2

# Master considered down if unresponsive for 30 seconds
sentinel down-after-milliseconds mymaster 30000

# Failover timeout set to 180 seconds
sentinel failover-timeout mymaster 180000

# Concurrently sync at most 1 replica with new master during failover
sentinel parallel-syncs mymaster 1

# Authentication parameters
sentinel auth-pass mymaster hbcerp_secure_redis_2026

# Prevent configuration modification at runtime
sentinel deny-scripts-reconfig yes
