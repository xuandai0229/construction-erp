scope: hbcerp-db
namespace: /service
name: pg-node-1

etcd3:
  hosts:
    - etcd-1.production.svc.cluster.local:2379
    - etcd-2.production.svc.cluster.local:2379
    - etcd-3.production.svc.cluster.local:2379

bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576 # 1MB maximum WAL replication lag allowed for failover
    postgresql:
      use_pg_rewind: true
      use_slots: true
      parameters:
        wal_level: replica
        max_wal_senders: 10
        max_replication_slots: 10
        hot_standby: "on"
        wal_keep_size: 4096MB
        archive_mode: "on"
        archive_command: "pgbackrest --stanza=hbcerp archive-push %p"

  init:
    pg_hba:
      - host replication replicator 10.0.0.0/8 md5
      - host all all 0.0.0.0/0 md5
    users:
      admin:
        password: hbcerp_secure_admin_2026
        options:
          - superuser
          - createdb

postgresql:
  listen: 0.0.0.0:5432
  connect_address: pg-node-1.production.svc.cluster.local:5432
  data_dir: /home/postgres/pgdata/pgroot/data
  bin_dir: /usr/lib/postgresql/16/bin
  pgpass: /home/postgres/.pgpass
  authentication:
    replication:
      username: replicator
      password: hbcerp_secure_replicator_2026
    superuser:
      username: postgres
      password: hbcerp_secure_postgres_2026
